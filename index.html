<script>
const sheetURL = "https://opensheet.elk.sh/1cxyCAgTDUbpvqTPVq3ZOqZQkw6lBGztqGWDjx7dyp7E/회원DB";

let members = [];
let currentFiltered = [];

fetch(sheetURL)
.then(res => res.json())
.then(data => members = data);

/* 🔍 검색 */
function searchMember() {
  const name = document.getElementById("nameInput").value.trim();
  const result = document.getElementById("result");

  const filtered = members.filter(m => m.이름.includes(name));
  currentFiltered = filtered;

  if (filtered.length === 0) {
    result.innerHTML = "검색 결과 없음";
    return;
  }

  if (filtered.length > 1) {
    showList(filtered);
    history.pushState({ page: "list" }, "", ""); // 🔥 기록
  } else {
    showSingle(filtered[0]);
  }
}

/* 👥 동명이인 리스트 */
function showList(filtered){
  document.querySelector(".back-btn").style.display = "block";

  let html = "<h4>동명이인 선택</h4>";
  filtered.forEach((m,i)=>{
    html += `<button onclick="selectMember(${i})">${m.이름} (${m.회원번호})</button><br>`;
  });

  document.getElementById("result").innerHTML = html;
}

/* 👇 선택 */
function selectMember(i){
  showSingle(currentFiltered[i]);
}

/* 🪪 회원증 */
function showSingle(m){
  history.pushState({ page: "card" }, "", ""); // 🔥 기록

  const today = new Date();
  const expiry = new Date(m.유효기간);
  const isExpired = m.유효기간 && expiry < today;

  document.querySelector(".back-btn").style.display = "block";

  document.getElementById("result").innerHTML = `
    <div class="card ${isExpired ? 'expired-card' : ''}">
      ${isExpired ? `<div class="stamp">사용불가</div>` : ""}

      <h2>회원증</h2>
      <img src="${m.사진URL}" class="profile">

      <div class="info-row"><span>회원번호</span><span>${m.회원번호}</span></div>
      <div class="info-row"><span>이름</span><span>${m.이름}</span></div>
      <div class="info-row"><span>단체명</span><span>${m.단체명}</span></div>
      <div class="info-row"><span>유효기간</span><span>${m.유효기간}</span></div>
    </div>
  `;
}

/* 🔙 뒤로가기 버튼 */
function goBack(){
  history.back();
}

/* 📱 브라우저/핸드폰 뒤로가기 처리 */
window.onpopstate = function(event) {

  // 아무 상태 없으면 → 메인
  if (!event.state) {
    document.getElementById("result").innerHTML = "";
    document.querySelector(".back-btn").style.display = "none";
    return;
  }

  // 리스트 상태
  if (event.state.page === "list") {
    showList(currentFiltered);
  }

  // 카드 상태
  if (event.state.page === "card") {
    // 카드 상태는 이미 이전 pushState에서 처리됨
  }
};
</script>
