<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>회원증 조회</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: "Noto Sans KR", sans-serif;
  background: #e8f5e9;
  text-align: center;
}

/* 뒤로가기 버튼 */
.back-btn {
  position: fixed;
  top: 15px;
  left: 15px;
  font-size: 24px;
  background: white;
  border-radius: 50%;
  width: 40px;
  height: 40px;
  line-height: 40px;
  text-align: center;
  box-shadow: 0 2px 6px rgba(0,0,0,0.2);
  cursor: pointer;
  display: none;
}

.logo {
  width: 100px;
  margin-top: 15px;
}

h1 {
  font-size: 22px;
  color: #1b5e20;
}

.search-box {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin: 15px auto;
  width: 90%;
  max-width: 350px;
}

.search-box input {
  flex: 1;
  padding: 12px;
  border-radius: 20px;
  border: 1px solid #ccc;
}

.search-box button {
  padding: 12px 16px;
  border-radius: 20px;
  border: none;
  background: #2e7d32;
  color: white;
  font-weight: bold;
}

.card {
  position: relative;
  width: 90%;
  max-width: 340px;
  margin: 20px auto;
  border-radius: 12px;
  background: white;
  padding: 25px 20px;
  border: 2px solid #2e7d32;
}

.expired-card {
  filter: grayscale(100%);
  opacity: 0.6;
}

.stamp {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) rotate(-20deg);
  border: 4px solid red;
  color: red;
  font-size: 30px;
  font-weight: bold;
  padding: 10px 20px;
  background: rgba(255,255,255,0.3);
}

.profile {
  width: 140px;
  height: 140px;
  border-radius: 10px;
  margin: 15px 0;
  object-fit: cover;
}

.info-row {
  display: flex;
  justify-content: space-between;
  margin-bottom: 6px;
}
</style>
</head>

<body>

<div class="back-btn" onclick="goBack()">←</div>

<h1>회원 검색</h1>

<div class="search-box">
  <input type="text" id="nameInput" placeholder="이름 입력">
  <button onclick="searchMember()">검색</button>
</div>

<div id="result"></div>

<script>
const sheetURL = "https://opensheet.elk.sh/1cxyCAgTDUbpvqTPVq3ZOqZQkw6lBGztqGWDjx7dyp7E/회원DB";

let members = [];
let currentFiltered = [];

fetch(sheetURL)
.then(res => res.json())
.then(data => members = data)
.catch(err => {
  document.getElementById("result").innerHTML = "데이터 불러오기 실패";
  console.error(err);
});

function searchMember() {
  const name = document.getElementById("nameInput").value.trim();
  const result = document.getElementById("result");

  const filtered = members.filter(m => m.이름 && m.이름.includes(name));
  currentFiltered = filtered;

  if (filtered.length === 0) {
    result.innerHTML = "검색 결과 없음";
    return;
  }

  if (filtered.length > 1) {
    showList(filtered);
    history.pushState({ page: "list" }, "", "");
  } else {
    showSingle(filtered[0]);
  }
}

function showList(filtered){
  document.querySelector(".back-btn").style.display = "block";

  let html = "<h3>동명이인 선택</h3>";
  filtered.forEach((m,i)=>{
    html += `<button onclick="selectMember(${i})">${m.이름} (${m.회원번호})</button><br>`;
  });

  document.getElementById("result").innerHTML = html;
}

function selectMember(i){
  showSingle(currentFiltered[i]);
}

function showSingle(m){
  history.pushState({ page: "card" }, "", "");

  const today = new Date();
  const expiry = new Date(m.유효기간);
  const isExpired = m.유효기간 && expiry < today;

  document.querySelector(".back-btn").style.display = "block";

  document.getElementById("result").innerHTML = `
    <div class="card ${isExpired ? 'expired-card' : ''}">
      ${isExpired ? `<div class="stamp">사용불가</div>` : ""}

      <h2>회원증</h2>
      <img src="${m.사진URL}" class="profile">

      <div class="info-row"><span>회원번호</span><span>${m.회원번호}</span></div>
      <div class="info-row"><span>이름</span><span>${m.이름}</span></div>
      <div class="info-row"><span>단체명</span><span>${m.단체명}</span></div>
      <div class="info-row"><span>유효기간</span><span>${m.유효기간}</span></div>
    </div>
  `;
}

function goBack(){
  history.back();
}

window.onpopstate = function(event) {
  if (!event.state) {
    document.getElementById("result").innerHTML = "";
    document.querySelector(".back-btn").style.display = "none";
    return;
  }

  if (event.state.page === "list") {
    showList(currentFiltered);
  }
};
</script>

</body>
</html>
