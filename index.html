<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>회원증 조회</title>

<style>
body {
  margin: 0;
  font-family: "Noto Sans KR", sans-serif;
  background: #e8f5e9;
  text-align: center;
}

.centered {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: 120px;
}

.search-box {
  display: flex;
  gap: 8px;
  justify-content: center;
  margin: 20px;
}

input {
  padding: 12px;
  border-radius: 20px;
  border: 1px solid #ccc;
  width: 200px;
}

button {
  padding: 12px 16px;
  border-radius: 20px;
  border: none;
  background: #2e7d32;
  color: white;
  font-weight: bold;
}

.card {
  width: 320px;
  margin: 20px auto;
  background: white;
  border-radius: 12px;
  padding: 20px;
  border: 2px solid #2e7d32;
}

.profile {
  width: 120px;
  height: 120px;
  border-radius: 10px;
  object-fit: cover;
  margin: 10px 0;
}

.info-row {
  display: flex;
  justify-content: space-between;
  margin: 6px 0;
}

.loading {
  color: #2e7d32;
  font-weight: bold;
}
</style>
</head>

<body class="centered">

<h2>회원증 조회</h2>

<div class="search-box">
  <input type="text" id="nameInput" placeholder="이름 입력">
  <button onclick="searchMember()">검색</button>
</div>

<div id="result"></div>

<script>
const API_URL = "https://script.google.com/macros/s/여기에ID/exec";

// 🔐 XSS 방지
function escapeHTML(str) {
  if (!str) return "";
  return String(str).replace(/[&<>"']/g, m => ({
    '&':'&amp;',
    '<':'&lt;',
    '>':'&gt;',
    '"':'&quot;',
    "'":'&#39;'
  }[m]));
}

// 🔥 날짜 포맷
function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  if (isNaN(d.getTime())) return dateStr;

  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const d2 = String(d.getDate()).padStart(2,'0');

  return `${y}-${m}-${d2}`;
}

// 🔥 검색 (서버 요청)
async function searchMember() {

  const name = document.getElementById("nameInput").value.trim();
  const result = document.getElementById("result");

  if (!name) {
    result.innerHTML = "이름을 입력하세요";
    return;
  }

  result.innerHTML = `<div class="loading">검색중...</div>`;

  try {
    const res = await fetch(API_URL + "?name=" + encodeURIComponent(name));
    const data = await res.json();

    if (!data.results || data.results.length === 0) {
      result.innerHTML = "검색 결과 없음";
      return;
    }

    showCard(data.results[0]);

  } catch (e) {
    result.innerHTML = "오류 발생";
  }
}

// 🔥 카드 출력
function showCard(m) {

  const isExpired = new Date(m.유효기간) < new Date();

  document.getElementById("result").innerHTML = `
    <div class="card ${isExpired ? 'expired' : ''}">
      <h3>회원증</h3>

      <img src="${escapeHTML(m.사진URL)}" class="profile">

      <div class="info-row"><span>회원번호</span><span>${escapeHTML(m.회원번호)}</span></div>
      <div class="info-row"><span>이름</span><span>${escapeHTML(m.이름)}</span></div>
      <div class="info-row"><span>단체명</span><span>${escapeHTML(m.단체명)}</span></div>
      <div class="info-row"><span>유효기간</span><span>${formatDate(m.유효기간)}</span></div>
    </div>
  `;
}
</script>

</body>
</html>
