<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>회원증 조회</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: "Noto Sans KR", sans-serif;
  background: #eef4fb;
  text-align: center;
}

/* 반응형 중앙 */
.centered {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: clamp(80px, 18vh, 180px);
}

/* 로고 */
.logo {
  width: 100px;
}

/* 제목 */
h1 {
  font-size: 22px;
  color: #003e8f;
  font-weight: 700;
}

h3 {
  color: #003e8f;
  font-weight: 700;
}

/* 검색창 */
.search-box {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin: 15px auto;
  width: 90%;
  max-width: 350px;
}

.search-box input {
  flex: 1;
  padding: 12px;
  border-radius: 20px;
  border: 1px solid #ccc;
}

.search-box button {
  padding: 12px 16px;
  border-radius: 20px;
  border: none;
  background: #1a5fb4;
  color: white;
  font-weight: 700;
  cursor: pointer;
}

/* 카드 */
.card {
  position: relative;
  width: 90%;
  max-width: 340px;
  margin: 20px auto;
  border-radius: 12px;
  background: white;
  padding: 25px 20px;
  border: 2px solid #1a5fb4;
  overflow: hidden;
}

/* 워터마크 */
.card::before {
  content: "";
  position: absolute;
  top: 50%;
  left: 50%;
  width: 200px;
  height: 200px;
  background: url('https://raw.githubusercontent.com/fafafadola/member-card/main/logo.png') no-repeat center;
  background-size: contain;
  opacity: 0.08;
  transform: translate(-50%, -50%);
}

/* 만료 */
.expired-card {
  filter: grayscale(100%);
  opacity: 0.6;
}

/* 도장 */
.stamp {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) rotate(-20deg);
  border: 4px solid red;
  color: red;
  font-size: 32px;
  font-weight: 700;
  padding: 10px 20px;
  background: rgba(255,255,255,0.3);
}

/* 사진 */
.profile {
  width: 140px;
  height: 140px;
  border-radius: 10px;
  margin: 15px 0;
  object-fit: cover;
  border: 1px solid #ccc;
}

/* 정보 */
.info-row {
  display: flex;
  justify-content: space-between;
  margin-bottom: 6px;
}

/* 흐르는 문구 */
.marquee {
  margin-top: 20px;
  overflow: hidden;
  white-space: nowrap;
  border-top: 1px solid #ddd;
  padding-top: 10px;
}

.marquee span {
  display: inline-block;
  padding-left: 100%;
  animation: scrollText 10s linear infinite;
  color: #003e8f;
  font-weight: 700;
}

@keyframes scrollText {
  0% { transform: translateX(0); }
  100% { transform: translateX(-100%); }
}

/* 로딩 스피너 */
.loader {
  border: 4px solid #eee;
  border-top: 4px solid #1a5fb4;
  border-radius: 50%;
  width: 30px;
  height: 30px;
  animation: spin 1s linear infinite;
  margin: 20px auto;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}

/* 카드 등장 애니메이션 */
.fade-in {
  opacity: 0;
  transform: translateY(20px);
  animation: fadeInUp 0.5s ease forwards;
}

@keyframes fadeInUp {
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
