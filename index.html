<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>회원증 조회 - 한강지키기운동</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">

<style>
  body { margin: 0; font-family: "Noto Sans KR", sans-serif; background: #e8f5e9; text-align: center; }
  .centered { display: flex; flex-direction: column; align-items: center; padding-top: clamp(80px, 18vh, 180px); }
  .logo { width: 100px; }
  h1 { font-size: 22px; color: #1b5e20; font-weight: 700; margin-top: 15px; }
  h3 { color: #1b5e20; font-weight: 700; font-size: 16px; margin-bottom: 20px; }

  .search-box { display: flex; justify-content: center; gap: 8px; margin: 15px auto; width: 90%; max-width: 350px; }
  .search-box input { flex: 1; padding: 12px; border-radius: 20px; border: 1px solid #ccc; outline: none; }

  .search-box button {
    padding: 12px 18px;
    border-radius: 20px;
    border: none;
    background: linear-gradient(135deg, #43a047, #1b5e20);
    color: white;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.25s ease;
    box-shadow: 0 4px 10px rgba(0,0,0,0.15);
  }
  .search-box button:hover {
    background: linear-gradient(135deg, #388e3c, #1b5e20);
    transform: translateY(-1px);
  }
  .search-box button:active {
    transform: scale(0.96);
  }

  /* 카드 */
  .card {
    position: relative;
    width: 90%;
    max-width: 340px;
    margin: 20px auto;
    border-radius: 12px;
    background: white;
    padding: 25px 20px;
    border: 2px solid #2e7d32;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    overflow: hidden;
  }

  /* 홀로그램 효과 */
  .card::after {
    content: "";
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: linear-gradient(
      120deg,
      transparent 30%,
      rgba(255,255,255,0.25) 45%,
      rgba(0,255,255,0.2) 50%,
      rgba(255,0,255,0.2) 55%,
      transparent 70%
    );
    transform: rotate(25deg);
    animation: hologram 4s linear infinite;
    pointer-events: none;
  }

  @keyframes hologram {
    0% { transform: translateX(-100%) rotate(25deg); }
    100% { transform: translateX(100%) rotate(25deg); }
  }

  .card-title {
    color: #1b5e20;
    letter-spacing: 5px;
    margin-bottom: 15px;
  }

  .profile {
    width: 140px;
    height: 140px;
    border-radius: 10px;
    margin: 15px 0;
    object-fit: cover;
    border: 1px solid #ccc;
    background: #f0f0f0;
  }

  .info-row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 8px;
    border-bottom: 1px dashed #eee;
    padding-bottom: 4px;
    font-size: 14px;
  }

  .info-row b { color: #1b5e20; }

  .marquee {
    margin-top: 20px;
    overflow: hidden;
    white-space: nowrap;
  }

  .marquee span {
    display: inline-block;
    padding-left: 100%;
    animation: scrollText 12s linear infinite;
    color: #1b5e20;
    font-weight: 700;
    font-size: 13px;
  }

  @keyframes scrollText {
    0% { transform: translateX(0); }
    100% { transform: translateX(-100%); }
  }

  /* 스탬프 */
  .stamp {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) rotate(-20deg);
    border: 4px solid #d32f2f;
    color: #d32f2f;
    font-size: 32px;
    font-weight: 900;
    padding: 10px 20px;
    background: rgba(255,255,255,0.3);
    z-index: 10;
    pointer-events: none;
  }

  .expired-card {
    filter: grayscale(100%);
    opacity: 0.6;
  }

  .loader { border: 4px solid #eee; border-top: 4px solid #2e7d32; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto; }
  @keyframes spin { 100% { transform: rotate(360deg); } }

  .fade-in { opacity: 0; transform: translateY(20px); animation: fadeInUp 0.5s ease forwards; }
  @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }

  .error-msg { color: #d32f2f; margin-top: 20px; font-weight: 700; }
</style>
</head>

<body class="centered" oncontextmenu="return false" onselectstart="return false">

  <img src="https://raw.githubusercontent.com/fafafadola/member-card/main/logo.png" class="logo">
  <h1>한강지키기운동 남양주지역본부</h1>
  <h3>회원증 실시간 조회</h3>

  <form class="search-box" onsubmit="searchMember(); return false;">
    <input type="text" id="nameInput" placeholder="회원 성명 입력" autocomplete="off">
    <button type="submit">조회하기</button>
  </form>

  <div id="result"></div>

  <script>
    const gasURL = "https://script.google.com/macros/s/AKfycbytBvH-ZM_In4vLtx38OSfnUe7FvDDLwhVFUVawu6DPXcfYeuB_415uhZf5NsXNn-nk/exec";

    async function searchMember() {
      const nameInput = document.getElementById("nameInput");
      const name = nameInput.value.trim();
      const resultDiv = document.getElementById("result");

      if (!name) {
        alert("성함을 입력해 주세요.");
        nameInput.focus();
        return;
      }

      document.body.classList.remove("centered");
      resultDiv.innerHTML = `
        <div class="loader"></div>
        <div style="color:#2e7d32;">서버에서 정보를 가져오는 중입니다...</div>
      `;

      try {
        const response = await fetch(`${gasURL}?name=${encodeURIComponent(name)}`);
        const data = await response.json();

        if (data.error) {
          resultDiv.innerHTML = `<p class="error-msg">⚠️ ${data.error}</p>`;
          return;
        }

        renderCard(data);
      } catch (error) {
        console.error("Error:", error);
        resultDiv.innerHTML = `<p class="error-msg">❌ 서버 통신 오류가 발생했습니다.<br>잠시 후 다시 시도해 주세요.</p>`;
      }
    }

    function renderCard(m) {
      const today = new Date();
      const expiry = m.유효기간 ? new Date(m.유효기간) : null;
      const isExpired = expiry && expiry < today;

      const cardHTML = `
        <div class="card ${isExpired ? 'expired-card' : ''} fade-in">
          ${isExpired ? `<div class="stamp">기간만료</div>` : ""}

          <h2 class="card-title">회 원 증</h2>

          <img src="${m.사진URL || 'https://via.placeholder.com/140?text=No+Image'}"
               class="profile"
               onerror="this.src='https://via.placeholder.com/140?text=No+Image'">

          <div style="text-align:left; width:100%; max-width:280px; margin: 0 auto;">
            <div class="info-row"><b>회원번호</b><span>${m.회원번호 || '-'}</span></div>
            <div class="info-row"><b>이름</b><span>${m.이름 || '-'}</span></div>
            <div class="info-row"><b>단체명</b><span>${m.단체명 || '-'}</span></div>
            <div class="info-row"><b>유효기간</b><span>${m.유효기간 || '기한없음'}</span></div>
          </div>

          <div class="marquee">
            <span>한강지키기운동 남양주지역본부 회원임을 인증합니다.</span>
          </div>
        </div>
      `;
      document.getElementById("result").innerHTML = cardHTML;
    }
  </script>
</body>
</html>
