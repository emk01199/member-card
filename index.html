<script>
const sheetURL = "https://opensheet.elk.sh/1cxyCAgTDUbpvqTPVq3ZOqZQkw6lBGztqGWDjx7dyp7E/회원DB";

let members = [];
let lastSearch = 0;

// 데이터 로딩
fetch(sheetURL)
  .then(res => res.json())
  .then(data => {
    members = data;
  });

// 🔐 XSS 방지
function escapeHTML(str) {
  if (!str) return "";
  return String(str).replace(/[&<>"']/g, m => ({
    '&':'&amp;',
    '<':'&lt;',
    '>':'&gt;',
    '"':'&quot;',
    "'":'&#39;'
  }[m]));
}

// 🔥 날짜 포맷 (핵심 추가)
function formatDate(dateStr) {
  if (!dateStr) return '';

  const d = new Date(dateStr);

  if (isNaN(d.getTime())) return dateStr;

  const year = d.getFullYear();
  const month = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');

  return `${year}-${month}-${day}`;
}

// 검색
function searchMember() {

  const now = Date.now();
  if (now - lastSearch < 1500) return;
  lastSearch = now;

  const name = document.getElementById("nameInput").value.trim();
  const result = document.getElementById("result");

  if (!name) {
    result.innerHTML = "이름을 입력하세요";
    return;
  }

  if (name.length < 2) {
    result.innerHTML = "2글자 이상 입력하세요";
    return;
  }

  const filtered = members.filter(m => m.이름 === name);

  if (filtered.length === 0) {
    result.innerHTML = "검색 결과 없음";
    return;
  }

  if (filtered.length > 1) {
    let html = "<h4>동명이인 선택</h4>";
    filtered.forEach((m,i)=>{
      html += `<button onclick="showCard(${i}, this.dataset.name)">
        ${escapeHTML(m.이름)} (${escapeHTML(m.회원번호)})
      </button><br>`;
    });
    document.getElementById("result").innerHTML = html;
  } else {
    showCard(0, filtered);
  }
}

// 카드 출력
function showCard(index, list){

  const m = list ? list[index] : members.find(x => x.이름 === document.getElementById("nameInput").value);

  const expiry = new Date(m.유효기간);
  const isExpired = expiry && expiry < new Date();

  document.getElementById("result").innerHTML = `
    <div class="card ${isExpired ? 'expired-card' : ''}">
      ${isExpired ? `<div class="stamp">사용불가</div>` : ""}

      <h2>회원증</h2>

      <img src="${escapeHTML(m.사진URL)}" class="profile">

      <div class="info-row"><span>회원번호</span><span>${escapeHTML(m.회원번호)}</span></div>
      <div class="info-row"><span>이름</span><span>${escapeHTML(m.이름)}</span></div>
      <div class="info-row"><span>단체명</span><span>${escapeHTML(m.단체명)}</span></div>

      <!-- 🔥 여기 유효기간 수정됨 -->
      <div class="info-row">
        <span>유효기간</span>
        <span>${formatDate(m.유효기간)}</span>
      </div>

      <div class="marquee">
        <span>이 회원은 인증된 사용자입니다.</span>
      </div>
    </div>
  `;
}
</script>
