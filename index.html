<script>
const API_URL = "https://script.google.com/macros/s/여기에ID/exec";

// 🔐 XSS 방지
function escapeHTML(str) {
  if (!str) return "";
  return String(str).replace(/[&<>"']/g, m => ({
    '&':'&amp;',
    '<':'&lt;',
    '>':'&gt;',
    '"':'&quot;',
    "'":'&#39;'
  }[m]));
}

// 🔥 날짜 포맷 (YYYY-MM-DD)
function formatDate(dateStr) {
  if (!dateStr) return '';

  const d = new Date(dateStr);
  if (isNaN(d.getTime())) return dateStr;

  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const d2 = String(d.getDate()).padStart(2, '0');

  return `${y}-${m}-${d2}`;
}

// 🚀 검색 (서버 요청)
async function searchMember() {

  const name = document.getElementById("nameInput").value.trim();
  const result = document.getElementById("result");

  if (!name) {
    result.innerHTML = "이름을 입력하세요";
    return;
  }

  result.innerHTML = "검색중...";

  try {
    const res = await fetch(API_URL + "?name=" + encodeURIComponent(name));
    const data = await res.json();

    if (!data.results || data.results.length === 0) {
      result.innerHTML = "검색 결과 없음";
      return;
    }

    // 첫 번째 결과 표시
    showCard(data.results[0]);

  } catch (e) {
    result.innerHTML = "오류 발생";
  }
}

// 🪪 카드 출력 (디자인 유지)
function showCard(m) {

  const expiry = new Date(m.유효기간);
  const isExpired = expiry && expiry < new Date();

  document.getElementById("result").innerHTML = `
    <div class="card ${isExpired ? 'expired-card' : ''}">
      ${isExpired ? `<div class="stamp">사용불가</div>` : ""}

      <h2>회원증</h2>

      <img src="${escapeHTML(m.사진URL)}" class="profile">

      <div class="info-row"><span>회원번호</span><span>${escapeHTML(m.회원번호)}</span></div>
      <div class="info-row"><span>이름</span><span>${escapeHTML(m.이름)}</span></div>
      <div class="info-row"><span>단체명</span><span>${escapeHTML(m.단체명)}</span></div>

      <div class="info-row">
        <span>유효기간</span>
        <span>${formatDate(m.유효기간)}</span>
      </div>

      <div class="marquee">
        <span>이 회원은 인증된 사용자입니다.</span>
      </div>
    </div>
  `;
}
</script>
